name: Docs site

on:
  push:
    branches:
      - main
    paths:
      - 'sites/docs/**'
      - 'examples/**'
      - 'packages/excerpter/**'
      - 'firebase.json'
      - 'tool/dash_site/**'
      - 'tool/config/linkcheck-skip-list.txt'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'analysis_options.yaml'
      - '.github/workflows/docs.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'sites/docs/**'
      - 'examples/**'
      - 'packages/excerpter/**'
      - 'firebase.json'
      - 'tool/dash_site/**'
      - 'tool/config/linkcheck-skip-list.txt'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'analysis_options.yaml'
      - '.github/workflows/docs.yml'
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  excerpts:
    name: Check code excerpts
    runs-on: ubuntu-latest
    if: github.repository == 'flutter/website'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: beta
      - name: Fetch Dart dependencies
        run: dart pub get
      - name: Check if excerpts are up to date
        run: dart run dash_site --site=docs refresh-excerpts --fail-on-update --dry-run

  linkcheck:
    name: Build and check links
    runs-on: ubuntu-latest
    if: github.repository == 'flutter/website'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: beta
      - name: Fetch Dart dependencies
        run: dart pub get
      - name: Install firebase-tools
        run: curl -sL https://firebase.tools | bash
      - name: Build site
        run: dart run dash_site --site=docs build
      - name: Check for broken Markdown link references
        run: dart run dash_site --site=docs check-link-references
      - name: Check for broken internal links
        run: dart run dash_site --site=docs check-links

  firebase-validate:
    name: Validate Firebase configuration
    runs-on: ubuntu-latest
    if: github.repository == 'flutter/website'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: beta
      - name: Fetch Dart dependencies
        run: dart pub get
      - name: Validate the firebase.json file
        run: dart run dash_site --site=docs verify-firebase-json
