name: docs_flutter_dev_site
publish_to: none
homepage: https://docs.flutter.dev

resolution: workspace
environment:
  sdk: ^3.11.0

dependencies:
  collection: ^1.19.1
  html: ^0.15.6
  http: ^1.6.0
  jaspr: ^0.23.0
  jaspr_content: ^0.5.2
  # Used as our template engine.
  liquify: 1.5.1
  meta: ^1.18.1
  path: ^1.9.1
  pub_semver: ^2.2.0
  site_shared: any
  universal_web: ^1.1.1+1
  yaml: ^3.1.3

dev_dependencies:
  analysis_defaults: any
  build_runner: ^2.13.1
  build_web_compilers: ^4.4.17
  jaspr_builder: ^0.23.0
  sass: ^1.97.3
  sass_builder: ^2.4.0

jaspr:
  mode: static
