substitutions:
  _SITE: docs
steps:
  - name: gcr.io/cloud-builders/git
    args: ['fetch', '--unshallow']
  - name: gcr.io/flutter-dev-230821/firebase-ghcli
    # Build the selected site, then deploy it to production.
    entrypoint: '/bin/bash'
    args:
      - '-c'
      - |-
        set -euo pipefail
        dart pub get
        dart run dash_site --site="$_SITE" deploy
options:
  logging: CLOUD_LOGGING_ONLY
