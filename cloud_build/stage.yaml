substitutions:
  _SITE: docs
steps:
  - name: gcr.io/flutter-dev-230821/firebase-ghcli
    # Build the selected site, deploy it to staging, then comment the preview link.
    entrypoint: '/bin/bash'
    args:
      - '-c'
      - |-
        set -euo pipefail
        dart pub get
        dart run dash_site --site="$_SITE" stage-preview \
          --pr-number "$_PR_NUMBER" \
          --repo "$REPO_FULL_NAME" \
          --commit-sha "$COMMIT_SHA" \
          --head-branch "$_HEAD_BRANCH"
    secretEnv: ['GH_PAT_TOKEN']
availableSecrets:
  secretManager:
    - versionName: projects/flutter-docs-prod/secrets/flutter-website-bot-comment-pat/versions/latest
      env: 'GH_PAT_TOKEN'
timeout: 1200s
options:
  logging: CLOUD_LOGGING_ONLY
