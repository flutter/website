steps:
  - name: gcr.io/flutter-dev-230821/firebase-ghcli
    # Build the selected site, deploy it to staging, then comment links on the PR.
    entrypoint: '/bin/bash'
    args:
      - '-c'
      - |-
        set -euo pipefail
        cloud_build/scripts/stage_sites_and_comment_on_github.sh
    secretEnv: ['GH_PAT_TOKEN']
    env:
      - 'PR_NUMBER=$_PR_NUMBER'
      - 'HEAD_BRANCH=$_HEAD_BRANCH'
      - 'PROJECT_ID=$PROJECT_ID'
      - 'COMMIT_SHA=$COMMIT_SHA'
      - 'REPO_FULL_NAME=$REPO_FULL_NAME'
      - 'SITE=$_SITE'
availableSecrets:
  secretManager:
    - versionName: projects/flutter-docs-prod/secrets/flutter-website-bot-comment-pat/versions/latest
      env: 'GH_PAT_TOKEN'
timeout: 1200s
options:
  logging: CLOUD_LOGGING_ONLY
