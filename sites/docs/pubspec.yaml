  # Used for syntax highlighting.
  opal: ^0.2.2
  path: ^1.9.1
  pub_semver: ^2.2.0
  universal_web: ^1.1.1+1
  yaml: ^3.1.3

dev_dependencies:
  analysis_defaults:
    path: ../../packages/analysis_defaults
  build_runner: ^2.13.1
