name: docs_flutter_dev_site
publish_to: none
homepage: https://docs.flutter.dev

resolution: workspace
environment:
  sdk: ^3.11.0

dependencies:
  build: ^4.0.5
  collection: ^1.19.1
  crypto: ^3.0.7
  html: ^0.15.6
  http: ^1.6.0
  jaspr: ^0.23.0
  jaspr_content: ^0.5.2
  # Used as our template engine.
  liquify: ^1.5.1
  markdown: ^7.3.0
  markdown_description_list: ^0.1.1
  meta: ^1.18.1
