<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 320" width="100%" height="320">
  <style>
    .box { fill: #f8f9fa; stroke: #dadce0; stroke-width: 1.5; rx: 6px; }
    .arrow { stroke: #80868b; stroke-width: 2; fill: none; }
    .label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 11px; fill: #5f6368; font-weight: 500; text-anchor: middle; }
    .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 13px; fill: #202124; font-weight: bold; text-anchor: middle; }
    .desc { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 11px; fill: #70757a; text-anchor: middle; }
    
    @media (prefers-color-scheme: dark) {
      .box { fill: #202124; stroke: #3c4043; }
      .arrow { stroke: #9aa0a6; }
      .label { fill: #9aa0a6; }
      .text { fill: #e8eaed; }
      .desc { fill: #9aa0a6; }
    }
  </style>

  <!-- Step 1: Input SDK -->
  <rect x="20" y="20" width="180" height="60" class="box" />
  <text x="110" y="47" class="text">Android SDK</text>
  <text x="110" y="65" class="desc">or Native JAR/AAR</text>

  <!-- Arrow 1 to Step 2 -->
  <path d="M 200 50 L 290 50" class="arrow" />
  <polygon points="290,47 296,50 290,53" fill="#80868b" />
  <text x="245" y="42" class="label">ApiSummarizer</text>

  <!-- Step 2: AST Parser -->
  <rect x="300" y="20" width="220" height="60" class="box" />
  <text x="410" y="47" class="text">jnigen AST parser</text>
  <text x="410" y="65" class="desc">Analyzes class layouts</text>

  <!-- Arrow 2 to Step 3 -->
  <path d="M 410 80 L 410 120" class="arrow" />
  <polygon points="407,120 410,126 413,120" fill="#80868b" />
  <text x="420" y="105" class="label" style="text-anchor: start;">Generate</text>

  <!-- Step 3: Generated Bindings -->
  <rect x="300" y="130" width="220" height="60" class="box" />
  <text x="410" y="157" class="text">android_os.g.dart</text>
  <text x="410" y="175" class="desc">Generated Dart Bindings</text>

  <!-- Arrow 3 to Step 4 -->
  <path d="M 410 190 L 410 230" class="arrow" />
  <polygon points="407,230 410,236 413,230" fill="#80868b" />
  <text x="420" y="215" class="label" style="text-anchor: start;">Type-safe Imports</text>

  <!-- Step 4: Flutter Plugin API -->
  <rect x="300" y="240" width="220" height="60" class="box" />
  <text x="410" y="275" class="text">Flutter Plugin API</text>

  <!-- Arrow 4 to Step 5 -->
  <path d="M 300 270 L 210 270" class="arrow" />
  <polygon points="210,267 204,270 210,273" fill="#80868b" />
  <text x="255" y="262" class="label">Calls</text>

  <!-- Step 5: Flutter App UI -->
  <rect x="20" y="240" width="180" height="60" class="box" />
  <text x="110" y="275" class="text">Flutter App UI</text>
</svg>
