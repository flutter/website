steps:
  - name: gcr.io/flutter-dev-230821/firebase-ghcli
    # Build the site, then deploy it to a preview channel.
    entrypoint: '/bin/bash'
    args:
      - '-c'
      - |-
        set -e

        dart pub global activate jaspr_cli
        export PATH="$$PATH":"$$HOME/.pub-cache/bin"
        dart pub get
        jaspr build --verbose
        firebase deploy --project=flutter-dev-230821 --only=hosting
options:
  logging: CLOUD_LOGGING_ONLY
