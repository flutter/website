name: flutter_website
description: >-
  The website for the Flutter open-source framework,
  built with Dart and Jaspr and hosted at flutter.dev.
homepage: https://flutter.dev

# This package is not intended for publishing or consumption. DO NOT publish.
publish_to: none

resolution: workspace
environment:
  sdk: ^3.12.0

dependencies:
  collection: ^1.19.1
  dart_mappable: ^4.8.0
  http: ^1.6.0
  image: ^4.8.0
  intl: ^0.20.2
  jaspr: ^0.23.1
  jaspr_content: ^0.5.2
  path: ^1.9.1
  site_shared:
    path: ../../packages/site_shared
  universal_web: ^1.1.1+1

dev_dependencies:
  analysis_defaults:
    path: ../../packages/analysis_defaults
  build_runner: ^2.15.0
  build_web_compilers: ^4.6.0
  code_builder: ^4.11.1
  dart_mappable_builder: ^4.8.0
  dart_style: ^3.1.7
  jaspr_builder: ^0.23.1
  sass_builder: ^2.4.0+1
  sealed_countries: ^3.0.1
  test: ^1.29.0
  youtube_transcript_api: ^1.0.0

jaspr:
  mode: static
