name: flutter_website
description: >-
  The website for the Flutter open-source framework,
  built with Dart and Jaspr and hosted at flutter.dev.

# This package is not intended for publishing or consumption. DO NOT publish.
publish_to: none

environment:
  sdk: ^3.11.0

dependencies:
  build: ^4.0.5
  collection: ^1.19.1
  crypto: ^3.0.7
  dart_mappable: ^4.8.0
  glob: ^2.1.3
  http: ^1.6.0
  image: ^4.8.0
  intl: ^0.20.2
  jaspr: ^0.23.0
  jaspr_content: ^0.5.2
  nanoid2: ^2.0.1
  path: ^1.9.1
  universal_web: ^1.1.1+1

dev_dependencies:
  analysis_defaults:
    git:
      url: https://github.com/dart-lang/site-shared
      path: pkgs/analysis_defaults
      ref: 3408a746891e80b12882ea1aca647f9a410ba851
  build_runner: ^2.13.1
  build_web_compilers: ^4.4.17
  code_builder: ^4.11.1
  dart_mappable_builder: ^4.8.0
  dart_style: ^3.1.7
  jaspr_builder: ^0.23.0
  sass_builder: ^2.4.0+1
  sealed_countries: ^3.0.1
  test: ^1.29.0
  youtube_transcript_api: ^1.0.0

jaspr:
  mode: static
